<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#233F91">
  <title>SL Identity</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="app">
    <article class="card">
      <img id="logo" class="logo" src="assets/logo/ultimo-logo.png" alt="AUNDE">

      <h1 id="name">Simone Laraia</h1>

      <section class="info">
        <strong id="departmentIt">Ente Tecnico</strong>
        <span id="departmentEn">Technical Department</span>
      </section>

      <section class="info">
        <strong id="roleIt">Tecnico di termoformatura</strong>
        <span id="roleEn">Fabric Thermoforming Specialist</span>
      </section>

      <section class="actions">
        <a id="contactLink" class="button primary" data-contact href="contact.vcf" download>
          <svg class="icon"><use href="assets/icons/icons.svg#user-plus"></use></svg>
          <span id="addContactLabel">Aggiungi ai contatti</span>
        </a>

        <div class="grid">
          <a id="phoneLink" class="button secondary" href="tel:+390119458087">
            <svg class="icon"><use href="assets/icons/icons.svg#phone"></use></svg>
            <span id="callLabel">Chiama</span>
          </a>

          <a id="emailLink" class="button secondary" href="mailto:simone.laraia@aunde.com">
            <svg class="icon"><use href="assets/icons/icons.svg#mail"></use></svg>
            <span id="emailLabel">Email</span>
          </a>
        </div>

        <a id="linkedinLink" class="button secondary linkedin" target="_blank" rel="noopener" href="https://www.linkedin.com/in/simone-laraia-b261567b/">
          <svg class="icon"><use href="assets/icons/icons.svg#linkedin"></use></svg>
          <span id="linkedinLabel">LinkedIn</span>
        </a>
      </section>

      <footer id="footer" class="footer">SL Identity</footer>
    </article>
  </main>

  <div id="toast" class="toast">Contatto pronto per essere aggiunto</div>

  <script src="js/app.js"></script>
</body>
</html>
