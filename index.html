<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#233F91">
  <title>SL Identity</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="app">
    <article class="card">
      <img id="logo" class="logo" src="" alt="Logo">

      <h1 id="name"></h1>

      <section class="info">
        <strong id="departmentIt"></strong>
        <span id="departmentEn"></span>
      </section>

      <section class="info">
        <strong id="roleIt"></strong>
        <span id="roleEn"></span>
      </section>

      <section class="actions">
        <a id="contactLink" class="button primary" data-contact href="contact.vcf" download>
          <svg class="icon"><use href="assets/icons/icons.svg#user-plus"></use></svg>
          <span id="contactLabel"></span>
        </a>

        <div class="grid">
          <a id="phoneLink" class="button secondary" href="#">
            <svg class="icon"><use href="assets/icons/icons.svg#phone"></use></svg>
            <span id="phoneLabel"></span>
          </a>

          <a id="emailLink" class="button secondary" href="#">
            <svg class="icon"><use href="assets/icons/icons.svg#mail"></use></svg>
            <span id="emailLabel"></span>
          </a>
        </div>

        <a id="linkedinLink" class="button secondary linkedin" target="_blank" rel="noopener" href="#">
          <svg class="icon"><use href="assets/icons/icons.svg#linkedin"></use></svg>
          <span id="linkedinLabel"></span>
        </a>
      </section>

      <footer id="footer" class="footer"></footer>
    </article>
  </main>

  <div class="toast" id="toast"></div>

  <script src="js/app.js"></script>
</body>
</html>
